nodes:
  unet_loader:
    class_type: UNETLoader
    title: "Load Diffusion Model"
    params:
      weight_dtype: "default"
  vae_loader:
    class_type: VAELoader
    title: "Load VAE"
  clip_loader:
    class_type: CLIPLoader
    title: "Load CLIP"
    params:
      type: "longcat_image"
      device: "default"
  
  cfg_norm:
    class_type: CFGNorm
    title: "CFGNorm"
    params:
      strength: 1.0

  flux_guidance_pos:
    class_type: FluxGuidance
    title: "FluxGuidance (Positive)"
    params:
      guidance: 4.0

  flux_guidance_neg:
    class_type: FluxGuidance
    title: "FluxGuidance (Negative)"
    params:
      guidance: 4.0

connections:
  - from: "unet_loader:0"
    to: "cfg_norm:model"
  - from: "cfg_norm:0"
    to: "ksampler:model"
  
  - from: "clip_loader:0"
    to: "pos_prompt:clip"
  - from: "clip_loader:0"
    to: "neg_prompt:clip"
    
  - from: "pos_prompt:0"
    to: "flux_guidance_pos:conditioning"
  - from: "neg_prompt:0"
    to: "flux_guidance_neg:conditioning"
    
  - from: "flux_guidance_pos:0"
    to: "ksampler:positive"
  - from: "flux_guidance_neg:0"
    to: "ksampler:negative"
  
  - from: "vae_loader:0"
    to: "vae_decode:vae"
  - from: "vae_loader:0"
    to: "vae_encode:vae"

dynamic_lora_chains:
  lora_chain:
    template: "LoraLoader"
    output_map:
      "unet_loader:0": "model"
      "clip_loader:0": "clip"
    input_map:
      "model": "model"
      "clip": "clip"
    end_input_map:
      "model": ["cfg_norm:model"]
      "clip": ["pos_prompt:clip", "neg_prompt:clip"]

dynamic_conditioning_chains:
  conditioning_chain:
    flux_guidance_node: "flux_guidance_pos"
    ksampler_node: "ksampler"
    clip_source: "clip_loader:0"

ui_map:
  unet_name: "unet_loader:unet_name"
  vae_name: "vae_loader:vae_name"
  clip_name: "clip_loader:clip_name"