nodes:
  checkpoint_loader:
    class_type: CheckpointLoaderSimple
    params: { ckpt_name: "ltx-2.3-22b-dev-nvfp4.safetensors" }
  text_encoder_loader:
    class_type: LTXAVTextEncoderLoader
    params: { text_encoder: "gemma_3_12B_it_fp4_mixed.safetensors", ckpt_name: "ltx-2.3-22b-dev-nvfp4.safetensors", device: "default" }
  audio_vae_loader:
    class_type: LTXVAudioVAELoader
    params: { ckpt_name: "ltx-2.3-22b-dev-nvfp4.safetensors" }
  distilled_lora:
    class_type: LoraLoaderModelOnly
    params: { lora_name: "ltx-2.3-22b-distilled-lora-384.safetensors", strength_model: 1.0 }
  control_lora:
    class_type: LoraLoaderModelOnly
    params: { lora_name: "{{ control_lora_name }}", strength_model: 1.0 }

  pos_prompt:
    class_type: CLIPTextEncode
  neg_prompt:
    class_type: CLIPTextEncode

  conditioning:
    class_type: LTXVConditioning
    params: { frame_rate: 24 }

  empty_latent_video:
    class_type: EmptyLTXVLatentVideo
    params: { batch_size: 1 }
  empty_latent_audio:
    class_type: LTXVEmptyLatentAudio
    params: { batch_size: 1, frame_rate: 24 }

  load_start_image:
    class_type: LoadImage
  resize_start_image:
    class_type: ImageScale
    params: { upscale_method: "lanczos", crop: "center" }
  preprocess_start_image:
    class_type: LTXVPreprocess
    params: { img_compression: 18 }
  start_image_inplace:
    class_type: LTXVImgToVideoInplace
    params: { bypass: false, strength: 0.7 }

  load_control_video:
    class_type: LoadVideo
  get_control_frames:
    class_type: GetVideoComponents
  get_first_frame:
    class_type: ImageFromBatch
    params: { batch_index: 0 }
  scale_control_frame:
    class_type: ImageScale
    params: { upscale_method: "area", crop: "center" }
  add_guide:
    class_type: LTXVAddGuide
    params: { frame_idx: 0, strength: 1.0 }

  latent_combiner_1:
    class_type: LTXVConcatAVLatent

  sigmas_1:
    class_type: ManualSigmas
    params: { sigmas: "1.0, 0.99375, 0.9875, 0.98125, 0.975, 0.909375, 0.725, 0.421875, 0.0" }
  noise_1:
    class_type: RandomNoise
  guider_1:
    class_type: CFGGuider
    params: { cfg: 1.0 }
  sampler_select_1:
    class_type: KSamplerSelect
    params: { sampler_name: "euler_ancestral_cfg_pp" }
  sampler_1:
    class_type: SamplerCustomAdvanced
  latent_separator_1:
    class_type: LTXVSeparateAVLatent

  video_decoder:
    class_type: VAEDecodeTiled
    params: { tile_size: 768, overlap: 64, temporal_size: 4096, temporal_overlap: 4 }
  audio_decoder:
    class_type: LTXVAudioVAEDecode
  create_video:
    class_type: CreateVideo
    params: { fps: 24 }
  save_video:
    class_type: SaveVideo
    params: { format: "mp4", codec: "auto" }

dynamic_lora_chains:
  loras:
    template: LoraLoader
    output_map:
      "distilled_lora:0": model
      "text_encoder_loader:0": clip
    input_map:
      model: model
      clip: clip
    template_output_map:
      "0": model
      "1": clip
    end_input_map:
      model: "control_lora:model"
      clip:
        - "pos_prompt:clip"
        - "neg_prompt:clip"

connections:
  - { from: "checkpoint_loader:0", to: "distilled_lora:model" }
  - { from: "distilled_lora:0", to: "control_lora:model" }
  - { from: "control_lora:0", to: "guider_1:model" }
  - { from: "checkpoint_loader:2", to: "video_decoder:vae" }
  - { from: "checkpoint_loader:2", to: "start_image_inplace:vae" }
  - { from: "checkpoint_loader:2", to: "add_guide:vae" }
  
  - { from: "text_encoder_loader:0", to: "pos_prompt:clip" }
  - { from: "text_encoder_loader:0", to: "neg_prompt:clip" }
  - { from: "audio_vae_loader:0", to: "empty_latent_audio:audio_vae" }
  - { from: "audio_vae_loader:0", to: "audio_decoder:audio_vae" }
  - { from: "pos_prompt:0", to: "conditioning:positive" }
  - { from: "neg_prompt:0", to: "conditioning:negative" }

  - { from: "load_start_image:0", to: "resize_start_image:image" }
  - { from: "resize_start_image:0", to: "preprocess_start_image:image" }
  - { from: "preprocess_start_image:0", to: "start_image_inplace:image" }
  - { from: "empty_latent_video:0", to: "start_image_inplace:latent" }

  - { from: "load_control_video:0", to: "get_control_frames:video" }
  - { from: "get_control_frames:0", to: "get_first_frame:image" }
  - { from: "get_first_frame:0", to: "scale_control_frame:image" }
  - { from: "scale_control_frame:0", to: "add_guide:image" }
  - { from: "empty_latent_video:0", to: "add_guide:latent" }
  - { from: "conditioning:0", to: "add_guide:positive" }
  - { from: "conditioning:1", to: "add_guide:negative" }

  - { from: "add_guide:0", to: "guider_1:positive" }
  - { from: "add_guide:1", to: "guider_1:negative" }

  - { from: "start_image_inplace:0", to: "latent_combiner_1:video_latent" }
  - { from: "empty_latent_audio:0", to: "latent_combiner_1:audio_latent" }
  - { from: "latent_combiner_1:0", to: "sampler_1:latent_image" }

  - { from: "guider_1:0", to: "sampler_1:guider" }
  - { from: "noise_1:0", to: "sampler_1:noise" }
  - { from: "sigmas_1:0", to: "sampler_1:sigmas" }
  - { from: "sampler_select_1:0", to: "sampler_1:sampler" }
  - { from: "sampler_1:0", to: "latent_separator_1:av_latent" }
  - { from: "latent_separator_1:0", to: "video_decoder:samples" }
  - { from: "latent_separator_1:1", to: "audio_decoder:samples" }
  - { from: "video_decoder:0", to: "create_video:images" }
  - { from: "audio_decoder:0", to: "create_video:audio" }
  - { from: "create_video:0", to: "save_video:video" }

ui_map:
  start_image: "load_start_image:image"
  control_video: "load_control_video:file"
  positive_prompt: "pos_prompt:text"
  negative_prompt: "neg_prompt:text"
  aspect_ratio:
    width: ["empty_latent_video:width", "resize_start_image:width"]
    height: ["empty_latent_video:height", "resize_start_image:height"]
  control_width: "scale_control_frame:width"
  control_height: "scale_control_frame:height"
  video_length:
    - "empty_latent_video:length"
    - "empty_latent_audio:frames_number"
    - "get_first_frame:length"
  seed: "noise_1:noise_seed"
  filename_prefix: "save_video:filename_prefix"